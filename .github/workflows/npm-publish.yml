name: npm publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        required: true
        default: all
        type: choice
        options:
          - all
          - core
          - ui
          - api
          - protocol
          - cli
      dry_run:
        description: Run checks and packing without publishing
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release
        run: pnpm release:check

      - name: Verify npm token for first publish
        if: ${{ !inputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN is required until all packages have been published once and trusted publishing is configured on npm."
            exit 1
          fi

          npm whoami

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          declare -A package_dirs=(
            [core]="packages/core"
            [ui]="packages/ui"
            [api]="packages/api"
            [protocol]="packages/mcp"
            [cli]="packages/cli"
          )

          publish_one() {
            local key="$1"
            local dir="${package_dirs[$key]}"
            local name version
            name="$(node -p "require('./${dir}/package.json').name")"
            version="$(node -p "require('./${dir}/package.json').version")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "Skipping ${name}@${version}; already published."
              return
            fi

            if [[ "${{ inputs.dry_run }}" == "true" ]]; then
              pack_dir="$(mktemp -d)"
              (cd "${dir}" && pnpm pack --pack-destination "${pack_dir}")
              rm -rf "${pack_dir}"
              return
            fi

            (cd "${dir}" && pnpm publish --access public --provenance --no-git-checks)
          }

          if [[ "${{ inputs.package }}" == "all" ]]; then
            for key in core ui api protocol cli; do
              publish_one "$key"
            done
          else
            publish_one "${{ inputs.package }}"
          fi
